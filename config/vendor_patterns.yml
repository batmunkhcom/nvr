    protocol: udp
    port: 37020
    payload_hex: "000000e8000000020000000100000000"
  api_paths:
    device_info: "/ISAPI/System/deviceInfo"
    capabilities: "/ISAPI/System/capabilities"
    ptz: "/ISAPI/PTZCtrl/channels"

